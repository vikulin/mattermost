name: "Unpack Playwright deps artifact"
description: >
  Download and extract the run-scoped artifact from pack-playwright-deps,
  restoring node_modules, lib/dist, and the chromium build into place.

inputs:
  fips:
    description: "Whether this is a FIPS-edition run. Must match the pack step so the correct artifact is downloaded."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: ci/download-playwright-deps
      uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
      with:
        name: e2e-playwright-deps${{ inputs.fips == 'true' && '-fips' || '' }}
        path: ${{ runner.temp }}
    - name: ci/unpack-playwright-deps
      shell: bash
      run: |
        set -euo pipefail
        tar -xzf "${RUNNER_TEMP}/playwright-node-modules.tgz" -C "${GITHUB_WORKSPACE}"
        tar -xzf "${RUNNER_TEMP}/playwright-browsers.tgz" -C "${HOME}"
