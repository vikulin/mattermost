name: "Restore E2E npm registry cache"
description: "Restore ~/.npm for cypress/playwright/api jobs (keyed on all E2E lockfiles)"

outputs:
  cache-hit:
    description: "true on an exact-key hit (not a restore-keys fallback)"
    value: ${{ steps.restore.outputs.cache-hit }}
  key:
    description: "The computed cache key"
    value: ${{ steps.key.outputs.key }}

runs:
  using: "composite"
  steps:
    - name: ci/compute-npm-cache-key
      id: key
      shell: bash
      run: echo "key=e2e-npm-registry-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('e2e-tests/cypress/package-lock.json', 'e2e-tests/playwright/package-lock.json', 'api/package-lock.json') }}" >> "${GITHUB_OUTPUT}"
    - name: ci/restore-npm-cache
      id: restore
      uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.npm
        key: ${{ steps.key.outputs.key }}
        restore-keys: |
          e2e-npm-registry-${{ runner.os }}-${{ runner.arch }}-
